{% extends "base.html" %}
{% block content %}
<h1>Register</h1>
<form method="POST">
  {{ form.hidden_tag() }}
  <p>{{ form.email.label }}<br>{{ form.email }}</p>
  <p>{{ form.password.label }}<br>{{ form.password }}</p>
  <p>{{ form.role.label }}<br>{{ form.role }}</p>
  <p>{{ form.share_code.label }}<br>{{ form.share_code }}</p>
  <p>{{ form.submit }}</p>
</form>
{% endblock %}
