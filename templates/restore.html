{% extends "base.html" %}
{% block content %}
<h1>Restore from Backup</h1>
<p>Upload a backup JSON file previously downloaded from the Account page. Restored records are added to what's already here — they won't replace or remove existing data.</p>

<form method="POST" enctype="multipart/form-data">
  <p>
    <label>Backup file</label>
    <input type="file" name="backup_file" accept="application/json">
  </p>
  <p><input type="submit" value="Restore"></p>
</form>
{% endblock %}
